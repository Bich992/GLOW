version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: timely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: timely
      POSTGRES_PASSWORD: timely
      POSTGRES_DB: timely
    ports:
      - '5432:5432'
    volumes:
      - timely_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U timely -d timely']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: timely-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@timely.dev
      PGADMIN_DEFAULT_PASSWORD: timely
    ports:
      - '5050:80'
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  timely_postgres_data:
    driver: local
